<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
@font-face {
  font-family: "MengYuanHeiTi";
  src: local("梦源黑体 SC W17"), url("file:///d:/Codes/group_special_title_client/data/梦源黑体 SC W17.ttc");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "MengYuanHeiTi", "Microsoft YaHei", sans-serif;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 24px;
  min-height: 100vh;
}

.card {
  background: #1a1a24;
  border: 1px solid #2a2a3a;
  border-radius: 12px;
  padding: 28px 32px;
  max-width: 620px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.title {
  font-size: 20px;
  color: #4fc3f7;
  margin-bottom: 16px;
  font-weight: 700;
}

.separator {
  border: none;
  height: 1px;
  background: #2a2a3a;
  margin-bottom: 16px;
}

.row {
  display: flex;
  padding: 6px 0;
  line-height: 1.6;
}

.row + .row {
  border-top: 1px solid #1e1e2a;
}

.label {
  color: #888;
  font-size: 13px;
  min-width: 100px;
  flex-shrink: 0;
  font-weight: 700;
}

.value {
  color: #d4d4d8;
  font-size: 13px;
  word-break: break-all;
  white-space: pre-wrap;
}
</style>
</head>
<body>
  <div class="card">
    <div class="title"> 系统状态</div>
    <hr class="separator">
    {{ROWS}}
  </div>
</body>
</html>
